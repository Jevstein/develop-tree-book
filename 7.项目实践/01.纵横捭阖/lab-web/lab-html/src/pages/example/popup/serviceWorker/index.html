
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Worker 通知演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        .btn-primary {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-active { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .status-inactive { background-color: #ef4444; }
        .status-pending { background-color: #f59e0b; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass-panel rounded-2xl p-8 w-full max-w-3xl">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">
                <i class="fas fa-bell text-blue-500 mr-2"></i>
                Service Worker 通知中心
            </h1>
            <p class="text-gray-600">
                使用 ServiceWorkerRegistration.showNotification API 实现持久化系统通知
            </p>
        </header>

        <!-- 状态面板 -->
        <div class="bg-white rounded-xl p-4 mb-6 border border-gray-200 shadow-sm">
            <div class="flex items-center justify-between mb-2">
                <span class="font-semibold text-gray-700">Service Worker 状态</span>
                <span id="sw-status-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-200 text-gray-600">
                    检测中...
                </span>
            </div>
            <div class="flex items-center justify-between">
                <span class="font-semibold text-gray-700">通知权限</span>
                <span id="perm-status-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-200 text-gray-600">
                    检测中...
                </span>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="notif-title" class="block text-sm font-medium text-gray-700 mb-2">
                        通知标题
                    </label>
                    <input 
                        type="text" 
                        id="notif-title" 
                        value="新消息提醒" 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none"
                    >
                </div>
                <div>
                    <label for="notif-body" class="block text-sm font-medium text-gray-700 mb-2">
                        通知内容
                    </label>
                    <input 
                        type="text" 
                        id="notif-body" 
                        value="您有一条新的未读消息，点击查看详情。" 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none"
                    >
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="notif-icon" class="block text-sm font-medium text-gray-700 mb-2">
                        图标 URL (可选)
                    </label>
                    <input 
                        type="url" 
                        id="notif-icon" 
                        placeholder="https://example.com/icon.png" 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none"
                    >
                </div>
                <div>
                    <label for="notif-tag" class="block text-sm font-medium text-gray-700 mb-2">
                        标签 Tag (用于替换旧通知)
                    </label>
                    <input 
                        type="text" 
                        id="notif-tag" 
                        value="demo-notification" 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none"
                    >
                </div>
            </div>

            <div class="flex flex-wrap gap-3 pt-2">
                <button 
                    id="btn-register-sw" 
                    class="btn-primary text-white font-semibold py-2 px-4 rounded-lg flex items-center"
                >
                    <i class="fas fa-server mr-2"></i>
                    注册 Service Worker
                </button>
                
                <button 
                    id="btn-request-perm" 
                    class="bg-white border border-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg hover:bg-gray-50 transition-colors flex items-center"
                >
                    <i class="fas fa-key mr-2"></i>
                    请求通知权限
                </button>

                <button 
                    id="btn-send-notif" 
                    disabled
                    class="btn-primary text-white font-semibold py-2 px-4 rounded-lg flex items-center opacity-50 cursor-not-allowed"
                >
                    <i class="fas fa-paper-plane mr-2"></i>
                    发送通知
                </button>
                
                <button 
                    id="btn-clear-all" 
                    class="bg-red-50 border border-red-200 text-red-600 font-semibold py-2 px-4 rounded-lg hover:bg-red-100 transition-colors flex items-center"
                >
                    <i class="fas fa-trash-alt mr-2"></i>
                    清除所有通知
                </button>
            </div>
        </div>

        <!-- 日志区域 -->
        <div class="mt-8">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">操作日志</h3>
            <div id="log-container" class="bg-gray-900 rounded-lg p-4 h-48 overflow-y-auto font-mono text-sm text-green-400">
                <div class="text-gray-500 italic">等待操作...</div>
            </div>
        </div>
        
        <div class="mt-6 text-xs text-gray-500 text-center">
            注意：Service Worker 需要在 HTTPS 或 localhost 环境下运行。通知显示效果取决于操作系统和浏览器设置。
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
