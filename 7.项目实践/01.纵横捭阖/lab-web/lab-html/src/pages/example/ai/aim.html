      stats = `<div class="stat-card highlight"><div class="stat-label">管道总金额</div><div class="stat-value" style="font-size:20px">${formatAmount(total)}</div></div>`;
      charts = `<div class="chart-panel"><h4>商机阶段分布</h4><div class="bar-chart">
        ${['需求确认','方案报价','方案编制','续费谈判'].map(st => { const c=BUSINESS_DATA.opportunities.filter(o=>o.stage===st).length; return `<div class="bar-row"><span class="bar-label">${st}</span><div class="bar-track"><div class="bar-fill" style="width:${c/4*100||10}%;background:#0891b2">${c}个</div></div></div>`; }).join('')}
      </div></div>`;
    } else if (key === 'business') {
      const pipe = BUSINESS_DATA.opportunities.reduce((s,o)=>s+o.amount,0);
      stats = `<div class="stat-card highlight"><div class="stat-label">销售管道</div><div class="stat-value" style="font-size:18px">${formatAmount(pipe)}</div></div>
        <div class="stat-card"><div class="stat-label">活跃客户</div><div class="stat-value">${BUSINESS_DATA.customers.length}</div></div>`;
      charts = `<div class="chart-panel"><h4>商机赢率</h4><div class="bar-chart">
        ${BUSINESS_DATA.opportunities.map(o=>`<div class="bar-row"><span class="bar-label" style="width:90px;font-size:11px">${o.customer.slice(0,6)}</span><div class="bar-track"><div class="bar-fill" style="width:${o.winRate}%;background:#be185d">${o.winRate}%</div></div></div>`).join('')}
      </div></div>`;
    } else if (key === 'approval') {
      const pending = BUSINESS_DATA.leaveRecords.filter(r=>r.status==='审批中').length
        + BUSINESS_DATA.expenses.filter(e=>e.status!=='已报销').length
        + BUSINESS_DATA.purchaseOrders.filter(p=>p.status!=='已完成').length;
      stats = `
        <div class="stat-card highlight"><div class="stat-label">在途审批</div><div class="stat-value">${pending}</div><div class="stat-sub">请假+报销+采购</div></div>
        <div class="stat-card"><div class="stat-label">本月请假</div><div class="stat-value">${BUSINESS_DATA.leaveRecords.reduce((s,r)=>s+r.days,0)}天</div></div>
        <div class="stat-card"><div class="stat-label">资产总值</div><div class="stat-value" style="font-size:18px">${formatAmount(BUSINESS_DATA.assets.reduce((s,a)=>s+a.total,0))}</div></div>`;
      charts = `<div class="report-row">
        <div class="chart-panel"><h4>审批类型业务量</h4><div class="bar-chart">
          ${[['请假',BUSINESS_DATA.leaveRecords.length],['采购',BUSINESS_DATA.purchaseOrders.length],['报销',BUSINESS_DATA.expenses.length],['出差',BUSINESS_DATA.trips.length]].map(([k,v])=>`<div class="bar-row"><span class="bar-label">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${v/4*100}%;background:#f59e0b">${v}笔</div></div></div>`).join('')}
        </div></div>
        <div class="chart-panel"><h4>预算执行概览</h4><div class="bar-chart">
          ${BUSINESS_DATA.budgetExec.map(b=>`<div class="bar-row"><span class="bar-label">${b.dept}</span><div class="bar-track"><div class="bar-fill" style="width:${b.rate}%;background:#3b82f6">${b.rate}%</div></div></div>`).join('')}
        </div></div>
      </div>`;
    } else {
      stats = `
        <div class="stat-card"><div class="stat-label">资产总值</div><div class="stat-value" style="font-size:20px">${formatAmount(BUSINESS_DATA.assets.reduce((s,a)=>s+a.total,0))}</div></div>
        <div class="stat-card"><div class="stat-label">任务完成率</div><div class="stat-value">${Math.round(BUSINESS_DATA.taskExec.filter(t=>t.progress===100).length/BUSINESS_DATA.taskExec.length*100)}%</div></div>
        <div class="stat-card"><div class="stat-label">待审报销</div><div class="stat-value">${BUSINESS_DATA.expenses.filter(e=>e.status!=='已报销').length}</div></div>`;
      charts = `<p style="font-size:13px;color:var(--text-2);margin-bottom:12px">选择左侧具体业务分类，查看专项业务报表。</p>`;
    }

    return `
      <div class="ledger-summary">
        <div class="ledger-pill"><strong>业务视角</strong></div>
        <div class="ledger-pill">${meta.report}</div>
      </div>
      <div class="stat-grid">${stats}</div>
      ${charts}
      <p style="font-size:11px;color:var(--text-3);margin-top:12px">业务报表从业务结果维度分析，支撑管理决策</p>`;
  }

  // ── Render Items View ──
  function renderItemsView() {
    const cat = ITEM_CATEGORIES[state.itemCategory] || ITEM_CATEGORIES.all;
    const bizMeta = getBizMeta();
    const showPerspective = state.itemViewMode === 'ledger' || state.itemViewMode === 'stats';

    // Category sidebar
    $('#itemsCatSidebar').innerHTML = `
      <h3>事项分类</h3>
      ${Object.values(ITEM_CATEGORIES).map(c => `
        <div class="cat-item ${state.itemCategory === c.id ? 'active' : ''}" data-item-cat="${c.id}">
          <span class="cat-icon">${c.icon}</span>
          <span>${c.label}</span>
          <span class="cat-count">${countByCategory(c.id)}</span>
        </div>
        ${c.subTypes && state.itemCategory === c.id ? c.subTypes.map(st => `
          <div class="cat-item cat-sub ${state.itemSubType === st.id ? 'active' : ''}" data-item-sub="${st.id}">${st.label}</div>
        `).join('') : ''}
      `).join('')}
    `;

    const modeLabel = { list: '', ledger: ' · 台账', stats: ' · 统计报表' }[state.itemViewMode];
    const perspLabel = showPerspective && state.itemPerspective === 'business'
      ? `（${bizMeta[state.itemViewMode === 'ledger' ? 'ledger' : 'report']}）` : '';
    $('#itemsViewTitle').textContent = cat.label + modeLabel + perspLabel;

    // Perspective bar
    $('#perspectiveBar').classList.toggle('hidden', !showPerspective);
    if (showPerspective) {
      $$('.perspective-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.perspective === state.itemPerspective);
      });
      $('#bizViewHint').textContent = state.itemPerspective === 'business'
        ? '按业务对象汇总，非事项流转记录'
        : '按 AIM 事项流转记录汇总';
    }

    // Status filters (list mode only)
    const filters = $('#itemFilters');
    if (state.itemViewMode === 'list') {
      filters.innerHTML = ITEM_TABS.map(t =>
        `<button class="chip ${t.id === state.itemTab ? 'active' : ''}" data-item-tab="${t.id}">${t.label}</button>`
      ).join('');
      filters.classList.remove('hidden');
    } else {
      filters.innerHTML = '';
      filters.classList.add('hidden');
    }

    // Mode tabs
    $$('.mode-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.itemMode === state.itemViewMode);
    });

    const content = $('#itemsContent');
    const items = filterItems();

    if (state.itemViewMode === 'list') {
      content.innerHTML = renderItemsList(items);
    } else if (state.itemViewMode === 'ledger') {
      content.innerHTML = state.itemPerspective === 'business'
        ? renderBusinessLedger(items, cat)
        : renderItemsLedger(items, cat);
    } else {
      content.innerHTML = state.itemPerspective === 'business'
        ? renderBusinessStats(items, cat)
        : renderItemsStats(items, cat);
    }
  }

  function renderItemsList(items) {
    const extraCol = state.itemCategory === 'approval' ? '<th>金额/天数</th>'
      : state.itemCategory === 'business' ? '<th>客户/金额</th>'
      : state.itemCategory === 'task' ? '<th>进度</th>'
      : state.itemCategory === 'meeting' || state.itemCategory === 'schedule' ? '<th>时间/地点</th>'
      : '<th>分类</th>';

    return `<table class="items-table">
      <thead><tr>
        <th>编号</th><th>标题</th><th>类型</th>${extraCol}<th>处理人</th><th>状态</th><th>更新时间</th>
      </tr></thead>
      <tbody>
        ${items.length ? items.map(item => {
          const extra = state.itemCategory === 'approval'
            ? `<td>${item.amount ? formatAmount(item.amount) : (item.days ? item.days + '天' : '—')}</td>`
            : state.itemCategory === 'business'
            ? `<td style="font-size:12px">${item.customer || '—'}${item.amount ? '<br>' + formatAmount(item.amount) : ''}</td>`
            : state.itemCategory === 'task'
            ? `<td>${item.progress != null ? item.progress + '%' : '—'}</td>`
            : state.itemCategory === 'meeting'
            ? `<td style="font-size:12px;color:var(--text-2)">${item.meetingTime || '—'}<br>${item.location || ''}</td>`
            : state.itemCategory === 'schedule'
            ? `<td style="font-size:12px;color:var(--text-2)">${item.scheduleTime || '—'}</td>`
            : `<td>${renderTypeBadge(item)}</td>`;
          const rowClass = item.chatId ? 'item-row' : 'no-chat';
          const clickAttr = item.chatId ? `data-item="${item.id}"` : '';
          return `<tr class="${rowClass}" ${clickAttr}>
            <td style="color:var(--primary);font-weight:600">${item.code}</td>
            <td>${item.title}</td>
            <td>${renderTypeBadge(item)}</td>
            ${extra}
            <td>${getUser(item.handler).name}</td>
            <td><span class="tag ${statusClass(item.status)}">${item.statusLabel}</span></td>
            <td style="color:var(--text-3)">${item.updated}</td>
          </tr>`;
        }).join('') : `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-3)">当前筛选下暂无事项</td></tr>`}
      </tbody>
    </table>`;
  }

  function renderItemsLedger(items, cat) {
    const totalAmount = items.filter(i => i.amount).reduce((s, i) => s + i.amount, 0);
    const processing = items.filter(i => i.status === 'processing').length;
    const done = items.filter(i => i.status === 'done').length;

    const ledgerCols = {
      approval: ['编号', '审批类型', '发起人', '金额', '部门', '状态', '创建日期'],
      task: ['编号', '任务名称', '负责人', '进度', '截止日期', '部门', '状态'],
      meeting: ['编号', '会议主题', '组织者', '时间', '地点', '时长', '状态'],
      schedule: ['编号', '日程标题', '所属人', '时间', '类型', '部门', '状态'],
      all: ['编号', '分类', '标题', '发起人', '处理人', '状态', '更新日期'],
    };
    const cols = ledgerCols[cat.id] || ledgerCols.all;

    const rows = items.map(item => {
      if (cat.id === 'approval') {
        return [item.code, item.type, getUser(item.initiator).name, formatAmount(item.amount) || (item.days ? item.days+'天' : '—'), item.dept || '—', item.statusLabel, item.created];
      }
      if (cat.id === 'task') {
        return [item.code, item.title, getUser(item.handler).name, (item.progress ?? '—') + (item.progress != null ? '%' : ''), item.dueDate || '—', item.dept || '—', item.statusLabel];
      }
      if (cat.id === 'meeting') {
        return [item.code, item.title, getUser(item.initiator).name, item.meetingTime || '—', item.location || '—', item.duration ? item.duration+'min' : '—', item.statusLabel];
      }
      if (cat.id === 'schedule') {
        return [item.code, item.title, getUser(item.initiator).name, item.scheduleTime || '—', item.type, item.dept || '—', item.statusLabel];
      }
      return [item.code, getCategoryLabel(item), item.title, getUser(item.initiator).name, getUser(item.handler).name, item.statusLabel, item.updated];
    });

    return `
      <div class="ledger-summary">
        <div class="ledger-pill"><strong>${items.length}</strong> 条记录</div>
        <div class="ledger-pill"><strong>${processing}</strong> 进行中</div>
        <div class="ledger-pill"><strong>${done}</strong> 已完成</div>
        ${cat.id === 'approval' ? `<div class="ledger-pill"><strong>${formatAmount(totalAmount)}</strong> 涉及金额合计</div>` : ''}
      </div>
      <table class="items-table">
        <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>
          ${rows.length ? rows.map((row, i) => {
            const item = items[i];
            const cls = item.chatId ? 'item-row' : 'no-chat';
            const attr = item.chatId ? `data-item="${item.id}"` : '';
            return `<tr class="${cls}" ${attr}>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`;
          }).join('') : `<tr><td colspan="${cols.length}" style="text-align:center;padding:40px;color:var(--text-3)">暂无台账数据</td></tr>`}
        </tbody>
      </table>
      <p style="font-size:11px;color:var(--text-3);margin-top:12px">台账数据来源于 AIM 事项流转记录，支持导出（演示）</p>`;
  }

  function renderItemsStats(items, cat) {
    const byStatus = { todo: 0, processing: 0, done: 0 };
    items.forEach(i => { byStatus[i.status] = (byStatus[i.status] || 0) + 1; });

    const catId = cat.id;
    let specificStats = '';
    let charts = '';

    if (catId === 'approval' || catId === 'all') {
      const approvalItems = catId === 'all' ? items.filter(i => i.category === 'approval') : items;
      const bySub = {};
      approvalItems.forEach(i => { bySub[i.subType] = (bySub[i.subType] || 0) + 1; });
      const subLabels = { leave: '请假', purchase: '采购', expense: '报销', trip: '出差', budget: '预算', other: '其他' };
      const maxSub = Math.max(...Object.values(bySub), 1);
      if (catId === 'approval') {
        const totalAmt = approvalItems.filter(i => i.amount).reduce((s, i) => s + i.amount, 0);
        specificStats = `<div class="stat-card highlight"><div class="stat-label">审批总金额</div><div class="stat-value">${formatAmount(totalAmt)}</div><div class="stat-sub">${approvalItems.length} 笔审批</div></div>`;
      }
      charts += `<div class="chart-panel"><h4>审批类型分布</h4><div class="bar-chart">
        ${Object.entries(bySub).map(([k, v]) => `
          <div class="bar-row">
            <span class="bar-label">${subLabels[k] || k}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${v/maxSub*100}%;background:#f59e0b">${v}</div></div>
            <span class="bar-val">${v}件</span>
          </div>`).join('')}
      </div></div>`;
      if (catId === 'all') {
        const totalAmt = approvalItems.filter(i => i.amount).reduce((s, i) => s + i.amount, 0);
        specificStats = `<div class="stat-card highlight"><div class="stat-label">审批总金额</div><div class="stat-value">${formatAmount(totalAmt)}</div><div class="stat-sub">${approvalItems.length} 笔审批</div></div>`;
      }
    }

    if (catId === 'task' || catId === 'all') {
      const taskItems = catId === 'all' ? items.filter(i => i.category === 'task') : items;
      const avgProgress = taskItems.filter(i => i.progress != null).reduce((s, i, _, a) => s + i.progress / a.length, 0) || 0;
      if (catId === 'task') {
        specificStats = `<div class="stat-card highlight"><div class="stat-label">平均完成度</div><div class="stat-value">${Math.round(avgProgress)}%</div><div class="stat-sub">${taskItems.length} 个任务</div></div>`;
      }
      charts += `<div class="chart-panel"><h4>任务进度分布</h4><div class="bar-chart">
        ${taskItems.filter(i => i.progress != null).map(i => `
          <div class="bar-row">
            <span class="bar-label" style="width:100px;font-size:11px">${i.title.slice(0,8)}…</span>
            <div class="bar-track"><div class="bar-fill" style="width:${i.progress}%;background:#3b82f6">${i.progress}%</div></div>
          </div>`).join('') || '<p style="color:var(--text-3);font-size:13px">暂无进度数据</p>'}
      </div></div>`;
    }

    if (catId === 'meeting') {
      specificStats = `<div class="stat-card highlight"><div class="stat-label">本月会议</div><div class="stat-value">${items.length}</div><div class="stat-sub">待召开 ${byStatus.todo || 0} 场</div></div>`;
      charts = `<div class="chart-panel"><h4>会议类型</h4><div class="bar-chart">
        ${['weekly', 'okr'].map(t => {
          const c = items.filter(i => i.subType === t).length;
          return `<div class="bar-row"><span class="bar-label">${t === 'weekly' ? '周会' : 'OKR'}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${c/items.length*100||0}%;background:#8b5cf6">${c}</div></div></div>`;
        }).join('')}
      </div></div>`;
    }

    if (catId === 'schedule') {
      specificStats = `<div class="stat-card highlight"><div class="stat-label">近期日程</div><div class="stat-value">${items.length}</div><div class="stat-sub">本周 ${items.length} 项</div></div>`;
    }

    if (catId === 'all') {
      const byCat = {};
      items.forEach(i => { byCat[i.category] = (byCat[i.category] || 0) + 1; });
      const maxCat = Math.max(...Object.values(byCat), 1);
      const catColors = { approval: '#f59e0b', task: '#3b82f6', meeting: '#8b5cf6', schedule: '#10b981' };
      charts = `<div class="report-row"><div class="chart-panel"><h4>事项分类占比</h4><div class="bar-chart">
        ${Object.entries(byCat).map(([k, v]) => `
          <div class="bar-row">
            <span class="bar-label">${ITEM_CATEGORIES[k]?.label || k}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${v/maxCat*100}%;background:${catColors[k]}">${v}</div></div>
            <span class="bar-val">${Math.round(v/items.length*100)}%</span>
          </div>`).join('')}
      </div></div>${charts}</div>`;
    }

    return `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">总计</div><div class="stat-value">${items.length}</div><div class="stat-sub">当前筛选范围</div></div>
        <div class="stat-card"><div class="stat-label">待处理</div><div class="stat-value">${byStatus.todo || 0}</div></div>
        <div class="stat-card"><div class="stat-label">进行中</div><div class="stat-value">${byStatus.processing || 0}</div></div>
        <div class="stat-card"><div class="stat-label">已完成</div><div class="stat-value">${byStatus.done || 0}</div></div>
        ${specificStats}
      </div>
      ${charts}
      <p style="font-size:11px;color:var(--text-3)">统计报表基于 AIM 事项数据实时汇总（演示数据）</p>`;
  }

  // ── Render Contacts ──
  function renderContacts() {
    $('#contactsGrid').innerHTML = CONTACTS.map((c) => `
      <div class="contact-card" data-user="${c.id}">
        <div class="contact-avatar" style="background:${c.color}">${c.avatar}</div>
        <div class="contact-name">${c.name}</div>
        <div class="contact-dept">${c.dept}</div>
      </div>
    `).join('');
  }

  // ── Render Main Views ──
  function renderMain() {
    const inChat = state.section === 'messages' && state.activeConv;
    $('#welcomeScreen').classList.toggle('hidden', inChat || state.section !== 'messages');
    $('#chatView').classList.toggle('hidden', !inChat);
    $('#itemsView').classList.toggle('hidden', state.section !== 'items');
    $('#contactsView').classList.toggle('hidden', state.section !== 'contacts');

    if (state.section === 'items') renderItemsView();
    if (state.section === 'contacts') renderContacts();
    if (inChat) renderChat();
  }

  // ── Render Chat ──
  function renderChat() {
    const conv = CONVERSATIONS[state.activeConv];
    if (!conv) return;

    // Header
    const activeId = state.activeLayer || state.activeConv;
    const activeConv = CONVERSATIONS[activeId] || conv;
    const acType = activeConv.type;
    const typeLabel = { dm: '单聊', group: '群聊', item: '事项群聊', ai: 'AI 私密对话', system: '系统消息' }[acType] || '';
    $('#chatHeader').innerHTML = `
      <div class="chat-header-info">
        <h3>${activeConv.name}</h3>
        <p>${typeLabel}${acType === 'ai' ? ' · 仅自己可见' : ''}${acType === 'group' ? ` · ${activeConv.members?.length || 0} 人 · ${activeConv.items?.length || 0} 个事项` : ''}${acType === 'item' ? ' · 可发起子事项' : ''}${activeConv.archived ? ' · 已归档' : ''}</p>
      </div>
      <div class="header-actions">
        ${activeConv.canTriggerItem ? '<button class="header-action-btn" id="btnTriggerItem">发起事项</button>' : ''}
        ${acType === 'item' ? '<button class="header-action-btn" id="btnTriggerSubItem" style="border-color:#059669;color:#059669">发起子事项</button>' : ''}
        ${(activeConv.type === 'group' && activeConv.items?.length) || acType === 'item' ? '<button class="header-action-btn" id="btnViewAIDemo">查看 AI 对话记录</button>' : ''}
        ${activeConv.type !== 'ai' && activeConv.type !== 'system' ? '<button class="header-action-btn ai-btn" id="btnOpenAI" style="border-color:#c4b5fd;color:#7c3aed">与 AI 对话</button>' : ''}
        <button class="header-action-btn" id="btnToggleCards">${state.showCardPanel ? '收起卡片' : '展开卡片'}</button>
      </div>
    `;

    // Layer tabs
    const layers = state.layers;
    if (layers.length > 0) {
      $('#layerTabs').innerHTML = layers.map((l, i) => {
        const lc = CONVERSATIONS[l] || { name: l };
        return `<button class="layer-tab ${l === state.activeLayer ? 'active' : ''}" data-layer="${l}">
          ${i > 0 ? '→ ' : ''}${lc.name}
          ${i > 0 ? '<span class="close-layer" data-close-layer="' + l + '">×</span>' : ''}
        </button>`;
      }).join('');
      $('#layerTabs').classList.remove('hidden');
    } else {
      $('#layerTabs').classList.add('hidden');
      $('#layerTabs').innerHTML = '';
    }

    // Messages
    renderMessages(activeConv);

    // Toolbar
    const toolbar = $('#chatToolbar');
    if (acType === 'ai') {
      toolbar.innerHTML = '<span style="font-size:12px;color:var(--ai)">✦ AI 将帮您梳理事项要素，确认后生成单据</span>';
    } else if (acType === 'item') {
      toolbar.innerHTML = `
        <button class="toolbar-btn">📎 附件</button>
        <button class="toolbar-btn">@ 提及</button>
        <button class="toolbar-btn ai-btn" id="toolbarAI">✦ 与 AI 对话处理本事项</button>
        <button class="toolbar-btn" id="toolbarSubItem" style="border-color:#6ee7b7;color:#059669">＋ 发起子事项</button>
      `;
    } else if (acType !== 'system') {
      toolbar.innerHTML = `
        <button class="toolbar-btn">📎 附件</button>
        <button class="toolbar-btn">@ 提及</button>
        <button class="toolbar-btn ai-btn" id="toolbarAI">✦ 与 AI 对话处理事项</button>
      `;
    } else {
      toolbar.innerHTML = '';
    }

    // Card panel
    $('#cardPanel').classList.toggle('hidden', !state.showCardPanel || acType === 'ai');
    renderCardPanel(activeConv);

    // Input placeholder
    const cur = getCurrentUser();
    $('#chatInput').placeholder = acType === 'ai'
      ? (activeConv.archived ? '已归档的 AI 对话，仅供查看' : '描述您要发起的事项，AI 将引导您完善...')
      : `以 ${cur.name} 身份输入消息...`;
    $('#chatInput').disabled = !!activeConv.archived;
    $('#sendBtn').disabled = !!activeConv.archived;
  }

  function renderMessages(conv) {
    const container = $('#chatMessages');
    let html = '';

    if (conv.isNew && conv.messages.length === 0) {
      html = `
        <div class="msg-date">今天</div>
        <div class="message ai">
          <div class="msg-avatar" style="background:#7c3aed">✦</div>
          <div>
            <div class="msg-sender">AIM 助手</div>
            <div class="msg-bubble">你好 ${getCurrentUser().name}！请告诉我您想发起什么工作事项，我会通过多轮对话帮您梳理所需信息，确认后自动生成单据并创建事项群聊。</div>
          </div>
        </div>`;
    }

    conv.messages.forEach(msg => {
      if (msg.type === 'date') {
        html += `<div class="msg-date">${msg.text}</div>`;
      } else if (msg.type === 'hint') {
        html += `<div class="msg-hint">${msg.text}</div>`;
      } else if (msg.type === 'divider') {
        html += `<div class="group-item-divider">${msg.text}</div>`;
      } else if (msg.type === 'flow') {
        html += `<div class="message flow-record"><div class="msg-bubble">⟳ ${msg.text}</div></div>`;
      } else if (msg.type === 'system') {
        html += `<div class="message system-msg"><div class="msg-bubble">${msg.text}</div></div>`;
      } else if (msg.type === 'card') {
        const item = ITEMS[msg.itemId];
        if (item) html += renderInlineCard(item, msg.time, msg.isSub);
      } else if (msg.type === 'form') {
        html += renderFormCard(msg.formId);
      } else if (msg.type === 'summary') {
        html += renderSummaryCard(msg.formId, false);
      } else if (msg.type === 'partial_summary') {
        html += renderSummaryCard(msg.formId, true);
      } else if (msg.type === 'app') {
        html += renderAppCard(msg.appType, msg.itemId);
      } else if (msg.type === 'draft') {
        html += renderDraftCard(msg.draft);
      } else if (msg.from) {
        const user = getUser(msg.from);
        const self = isSelf(msg.from);
        const isAI = msg.from === 'ai';
        html += `
          <div class="message ${self ? 'self' : ''} ${isAI ? 'ai' : ''}">
            ${!self ? `<div class="msg-avatar" style="background:${user.color}">${user.avatar}</div>` : ''}
            <div>
              ${!self ? `<div class="msg-sender">${user.name}${msg.time ? ' · ' + msg.time : ''}</div>` : ''}
              <div class="msg-bubble">${msg.text}</div>
            </div>
          </div>`;
      }
    });

    // AI flow draft
    if (state.aiFlow && state.aiFlow.convId === conv.id && state.aiFlow.draft) {
      html += renderDraftCard(state.aiFlow.draft);
    }

    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
  }

  function renderInlineCard(item, time, isSub) {
    const kindTag = item.itemKind === 'business'
      ? '<span class="scene-tag">业务事项</span>'
      : '<span class="process-tag">流程事项</span>';
    const subLabel = isSub || item.parent ? '<span class="tag ai-tag" style="margin-left:4px">子事项</span>' : '';
    return `
      <div class="message">
        <div class="msg-avatar item" style="background:linear-gradient(135deg,${item.itemKind==='business'?'#be185d,#ec4899':'#059669,#34d399'});border-radius:10px">事</div>
        <div>
          <div class="msg-sender">事项卡片${item.parent ? '（子事项）' : ''} · ${time || ''} ${kindTag}</div>
          <div class="item-card-inline" data-open-item-chat="${item.id}">
            <div class="card-inline-header">
              <div class="card-inline-icon">${item.parent ? '↳' : '📋'}</div>
              <div>
                <div class="card-inline-title">${item.title}${subLabel}</div>
                <div class="card-inline-id">${item.code}${item.parent ? ' · 隶属 ' + (ITEMS[item.parent]?.code || '') : ''}</div>
              </div>
            </div>
            <div class="card-inline-body">${item.desc}</div>
            <div class="card-inline-footer">
              <span class="tag ${statusClass(item.status)}">${item.statusLabel}</span>
              <span>处理人: ${getUser(item.handler).name}</span>
            </div>
            <div class="card-inline-actions">
              <button class="card-action-btn" data-open-item-chat="${item.id}">进入事项群聊</button>
              ${item.formId ? `<button class="card-action-btn primary" data-fill-form="${item.formId}">填写/查看</button>` : `<button class="card-action-btn primary" data-open-item-ai="${item.id}">AI 协助处理</button>`}
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderFormCard(formId) {
    const form = getFormDef(formId);
    if (!form) return '';
    const uid = state.currentUserId;
    const submitted = getFormSubmittedUsers(formId);
    const canFill = form.assignees.includes(uid) && !form.submissions[uid];
    return `
      <div class="message">
        <div class="msg-avatar" style="background:#be185d;border-radius:10px">填</div>
        <div>
          <div class="msg-sender">数据填报应用 · ${form.title}</div>
          <div class="form-card-inline">
            <h4>📊 ${form.title}</h4>
            ${form.fields.map(f => `<div class="form-field-row"><span>${f}</span><span style="color:var(--text-3)">必填</span></div>`).join('')}
            <div class="submit-status">
              ${form.assignees.map(id => `<span class="submit-chip ${form.submissions[id] ? 'done' : 'pending'}">${getUser(id).name}${form.submissions[id] ? ' ✓' : ' 待填'}</span>`).join('')}
            </div>
            ${canFill ? `<div class="card-inline-actions" style="margin-top:10px"><button class="card-action-btn primary" data-submit-form="${formId}">提交我的填报</button></div>` : ''}
          </div>
        </div>
      </div>`;
  }

  function renderSummaryCard(formId, partial) {
    const form = getFormDef(formId);
    const summary = computeFormSummary(formId);
    if (!form || !summary) return '';
    const title = partial ? `阶段性汇总 (${summary.count}/${summary.total} 已提交)` : 'Q1 业绩汇总报告';
    return `
      <div class="message flow-record" style="max-width:92%">
        <div class="summary-card-inline" style="max-width:100%">
          <h4>📈 AIM 自动生成 · ${title}</h4>
          <div class="summary-grid">
            <div class="summary-cell"><div class="val">${summary.signed}</div><div class="lbl">签约(万)</div></div>
            <div class="summary-cell"><div class="val">${summary.received}</div><div class="lbl">回款(万)</div></div>
            <div class="summary-cell"><div class="val">${summary.newClients}</div><div class="lbl">新客户</div></div>
            <div class="summary-cell"><div class="val">${summary.opps}</div><div class="lbl">商机数</div></div>
          </div>
          <div class="mini-table-wrap"><table class="mini-table"><thead><tr><th>填报人</th><th>签约</th><th>回款</th><th>新客户</th><th>商机</th></tr></thead>
          <tbody>${Object.entries(form.submissions).map(([uid, r]) => `<tr><td>${getUser(uid).name}</td><td>${r['签约金额(万)']}</td><td>${r['回款金额(万)']}</td><td>${r['新客户数']}</td><td>${r['有效商机数']}</td></tr>`).join('')}</tbody></table></div>
          ${partial ? '<p style="font-size:11px;color:var(--warning);margin-top:8px">待全员提交后将更新最终报表</p>' : ''}
        </div>
      </div>`;
  }

  function renderAppCard(appType, itemId) {
    const item = ITEMS[itemId];
    if (!item) return '';
    if (appType === 'opportunity') {
      return `<div class="message"><div class="msg-avatar" style="background:#0891b2;border-radius:10px">商</div><div>
        <div class="msg-sender">商机应用</div>
        <div class="app-card-inline"><h4>🎯 商机详情</h4>
          <div class="form-field-row"><span>客户</span><span>${item.customer || '—'}</span></div>
          <div class="form-field-row"><span>预计金额</span><span>${formatAmount(item.amount)}</span></div>
          <div class="form-field-row"><span>阶段</span><span>${item.stage || '—'}</span></div>
          <div class="form-field-row"><span>赢率</span><span>${item.winRate || '—'}%</span></div>
          <div class="form-field-row"><span>负责人</span><span>${getUser(item.initiator).name}</span></div>
        </div></div></div>`;
    }
    if (appType === 'quote') {
      const q = BUSINESS_DATA.quotes.find(x => x.itemCode === item.code);
      return `<div class="message"><div class="msg-avatar" style="background:#6366f1;border-radius:10px">报</div><div>
        <div class="msg-sender">报价应用</div>
        <div class="app-card-inline"><h4>💰 报价单</h4>
          <div class="form-field-row"><span>客户</span><span>${item.customer || q?.customer || '—'}</span></div>
          <div class="form-field-row"><span>产品</span><span>${q?.product || 'AIM 企业版'}</span></div>
          <div class="form-field-row"><span>席位</span><span>${q?.seats || '—'}</span></div>
          <div class="form-field-row"><span>报价金额</span><span>${formatAmount(item.amount)}</span></div>
          <div class="form-field-row"><span>有效期</span><span>${q?.validUntil || '30天'}</span></div>
        </div></div></div>`;
    }
    return '';
  }

  function renderDraftCard(draft) {
    return `
      <div class="message ai">
        <div class="msg-avatar" style="background:#7c3aed">✦</div>
        <div>
          <div class="msg-sender">AIM 助手 · 单据草稿</div>
          <div class="draft-card">
            <h4>✦ 请确认事项信息</h4>
            ${Object.entries(draft).map(([k, v]) =>
              `<div class="draft-field"><span class="draft-label">${k}</span><span class="draft-value">${v}</span></div>`
            ).join('')}
            <div class="draft-actions">
              <button class="card-action-btn" id="draftEdit">修改</button>
              <button class="card-action-btn primary" id="draftConfirm">确认并发起流转</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  function renderCardPanel(conv) {
    const itemIds = conv.items || [];
    const cards = itemIds.map(id => ITEMS[id]).filter(Boolean);
    const activeItemId = state.selectedSideItem || conv.itemId || cards[0]?.id;

    $('#cardCount').textContent = `${cards.length} 项`;

    if (cards.length === 0) {
      $('#cardPanelBody').innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px">
        暂无关联事项<br><br>
        <span style="font-size:12px">在对话中发起事项后，卡片将显示在这里</span>
      </div>`;
      $('#cardTimeline').innerHTML = '';
      return;
    }

    $('#cardPanelBody').innerHTML = cards.map(item => {
      const nested = (item.nested || []).map(id => ITEMS[id]).filter(Boolean);
      const isActive = item.id === activeItemId;
      return `
        <div class="side-card ${isActive ? 'active' : ''}" data-side-item="${item.id}">
          <div class="side-card-header">
            <div class="side-card-title">${item.title}</div>
            <span class="side-card-status tag ${statusClass(item.status)}">${item.statusLabel}</span>
          </div>
          <div class="side-card-desc">${item.desc}</div>
          <div class="side-card-meta">
            <span>📋 ${item.code}</span>
            <span>👤 ${getUser(item.handler).name}</span>
            <span>发起: ${getUser(item.initiator).name}</span>
          </div>
          ${nested.length ? `<div class="side-card-nested">
            <div style="font-size:11px;color:var(--text-3);margin-bottom:4px">子事项</div>
            ${nested.map(n => `<div class="nested-link" data-open-item-chat="${n.id}">↳ ${n.title}</div>`).join('')}
          </div>` : ''}
        </div>`;
    }).join('');

    const focusItem = ITEMS[activeItemId] || cards[0];
    if (focusItem?.timeline) {
      $('#cardTimeline').innerHTML = `
        <h4>流转记录 · ${focusItem.code}</h4>
        ${focusItem.timeline.map(t => `
          <div class="timeline-item">
            <div class="timeline-dot ${t.done ? 'done' : ''}"></div>
            <div>
              <div class="timeline-content">${t.text}</div>
              <div class="timeline-time">${t.time}</div>
            </div>
          </div>
        `).join('')}`;
    }
  }

  // ── Actions ──
  function openConversation(convId) {
    state.section = 'messages';
    state.activeConv = convId;
    state.layers = [convId];
    state.activeLayer = convId;
    state.aiFlow = null;
    const conv = CONVERSATIONS[convId];
    if (conv) {
      conv.unread = 0;
      if (conv.itemId) state.selectedSideItem = conv.itemId;
    }
    renderAll();
  }

  function openItemChat(itemId, { asLayer = false } = {}) {
    const chatId = getItemChatId(itemId);
    if (!chatId || !CONVERSATIONS[chatId]) {
      showToast('未找到该事项的对话');
      return;
    }
    state.selectedSideItem = itemId;
    if (asLayer && state.activeConv) {
      pushLayer(chatId);
    } else {
      openConversation(chatId);
    }
  }

  function pushLayer(convId) {
    if (!state.layers.includes(convId)) state.layers.push(convId);
    state.activeLayer = convId;
    renderAll();
  }

  function popLayer(convId) {
    const idx = state.layers.indexOf(convId);
    if (idx > 0) {
      state.layers = state.layers.slice(0, idx);
      state.activeLayer = state.layers[state.layers.length - 1];
      renderAll();
    }
  }

  function startNewItemAI(contextConvId, { isSubItem = false } = {}) {
    const aiConv = CONVERSATIONS.ai_new;
    aiConv.isNew = false;
    aiConv.messages = [];
    aiConv.archived = false;
    const ctx = contextConvId ? CONVERSATIONS[contextConvId] : null;

    if (ctx) {
      const importCount = ctx.messages?.filter(m => m.from || m.type === 'card').length || 0;
      aiConv.messages.push({ type: 'hint', text: `已从「${ctx.name}」导入 ${Math.min(importCount, 8)} 条相关聊天记录` });

      if (isSubItem && ctx.type === 'item' && ctx.itemId) {
        const parentItem = ITEMS[ctx.itemId];
        aiConv.name = `AI 对话 · 子事项（从「${parentItem?.title || ctx.name}」）`;
        state.aiFlow = {
          convId: 'ai_new', step: 0, contextConvId,
          mode: 'sub', parentItemId: ctx.itemId, parentChatId: contextConvId,
        };
      } else {
        aiConv.name = `AI 对话 · 从「${ctx.name}」发起`;
        state.aiFlow = { convId: 'ai_new', step: 0, contextConvId, mode: 'main' };
      }
    } else {
      aiConv.name = 'AI 事项助手';
      state.aiFlow = { convId: 'ai_new', step: 0, mode: 'main' };
    }

    if (contextConvId && state.activeConv) {
      pushLayer('ai_new');
    } else {
      openConversation('ai_new');
    }
  }

  function viewAIDemoHistory() {
    const conv = CONVERSATIONS[state.activeLayer || state.activeConv];
    if (conv?.id === 'group_sales' || conv?.itemId === 'item15') {
      pushLayer('ai_demo_performance');
    } else if (conv?.type === 'item') {
      pushLayer('ai_demo_subitem');
    } else {
      pushLayer('ai_demo_procurement');
    }
  }

  function handleAISend(text) {
    const conv = CONVERSATIONS[state.activeLayer || 'ai_new'];
    if (!conv || conv.type !== 'ai') return;

    conv.messages.push({ from: state.currentUserId, text, time: '刚刚' });
    conv.preview = text;

    const flow = state.aiFlow || { step: 0, convId: conv.id };
    flow.step++;

    setTimeout(() => {
      const replies = [
        '好的，我已了解您的需求。请问涉及的预算金额和相关部门是？',
        '明白了。是否有指定供应商？审批流程需要经过哪些人？',
        '还需要补充什么材料吗？比如报价单、资质文件等？',
        '最后确认一下时间节点，希望什么时候完成？',
      ];
      if (flow.step <= replies.length) {
        conv.messages.push({ from: 'ai', text: replies[flow.step - 1], time: '刚刚' });
      }
      if (flow.step >= 4) {
        const cur = getCurrentUser();
        const isSub = flow.mode === 'sub';
        const parentItem = isSub ? ITEMS[flow.parentItemId] : null;
        flow.draft = isSub ? {
          '事项类型': '子事项',
          '标题': '显示器型号确认（草稿）',
          '发起人': cur.name,
          '隶属主事项': parentItem?.title || '—',
          '处理人': '李华',
          '说明': '从主事项拆分，并行处理',
        } : {
          '事项类型': '采购申请',
          '标题': '新采购申请（草稿）',
          '发起人': cur.name,
          '预算金额': '待填写',
          '审批流程': '部门负责 → 财务审核',
          '首步处理人': '李华（部门初审）',
        };
        const tip = isSub
          ? '子事项信息已完整，确认后将创建子事项群聊并关联到主事项。'
          : '多轮沟通完成，请确认以下单据草稿。确认后将自动创建事项群聊并拉入相关人员。';
        conv.messages.push({ from: 'ai', text: tip, time: '刚刚' });
      }
      state.aiFlow = flow;
      renderAll();
    }, 700);
  }

  function confirmDraft() {
    const flow = state.aiFlow;
    state.aiFlow = null;
    if (CONVERSATIONS.ai_new) {
      CONVERSATIONS.ai_new.messages = [];
      CONVERSATIONS.ai_new.isNew = true;
    }

    if (flow?.mode === 'sub' && flow.parentItemId) {
      const parentChat = CONVERSATIONS[flow.parentChatId];
      const parentItem = ITEMS[flow.parentItemId];
      const subId = 'item2';
      if (parentChat && !parentChat.messages.some(m => m.type === 'card' && m.itemId === subId)) {
        parentChat.messages.push(
          { type: 'flow', text: '子事项已创建 · 李华、王芳 已加入子事项群聊', time: '刚刚' },
          { type: 'card', itemId: subId, time: '刚刚', isSub: true },
        );
        if (!parentChat.items.includes(subId)) parentChat.items.push(subId);
        if (!parentItem.nested.includes(subId)) parentItem.nested.push(subId);
      }
      showToast('子事项已创建！已关联到主事项并创建子事项群聊');
      openItemChat(subId, { asLayer: true });
      return;
    }

    showToast('事项已创建！相关人员已加入事项群聊（演示）');
    openItemChat('item1');
  }

  function sendMessage() {
    const input = $('#chatInput');
    const text = input.value.trim();
    if (!text) return;

    const convId = state.activeLayer || state.activeConv;
    const conv = CONVERSATIONS[convId];
    if (!conv) return;

    if (conv.type === 'ai' && !conv.archived) {
      input.value = '';
      handleAISend(text);
      return;
    }

    if (conv.archived) {
      showToast('这是已归档的 AI 对话记录，仅供查看');
      return;
    }

    conv.messages.push({ from: state.currentUserId, text, time: '刚刚' });
    const cur = getCurrentUser();
    conv.preview = `${cur.name}: ${text}`;
    input.value = '';
    renderAll();

    if (conv.type === 'dm' && conv.canTriggerItem) {
      setTimeout(() => { showTriggerModal(conv.triggerPreset || 'purchase', convId); }, 1200);
    }
    if (conv.id === 'group_sales' && /业绩|反馈.*Q1|季度.*销售|销售.*情况/.test(text)) {
      setTimeout(() => { showTriggerModal('performance', convId); }, 1000);
    }
  }

  function openItemAI(itemId) {
    const item = ITEMS[itemId];
    const aiId = 'ai_item_' + itemId;
    const cur = getCurrentUser();
    if (!CONVERSATIONS[aiId]) {
      CONVERSATIONS[aiId] = {
        id: aiId, type: 'ai', name: `AI 协助 · ${item.title}`,
        preview: '我可以帮您处理这个事项', time: '现在', unread: 0,
        messages: [
          { from: 'ai', text: `${cur.name}，您好！我正在协助您处理「${item.title}」。当前状态：${item.statusLabel}，待处理人：${getUser(item.handler).name}。请问需要什么帮助？` },
        ],
        items: [itemId],
        parentItem: itemId,
      };
    }
    pushLayer(aiId);
  }

  function renderAll() {
    renderNav();
    renderListPanel();
    renderMain();
  }

  // ── Event Listeners ──
  $$('.nav-btn[data-section]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.section = btn.dataset.section;
      if (state.section !== 'messages') {
        state.activeConv = null;
        state.layers = [];
        state.activeLayer = null;
      }
      renderAll();
    });
  });

  $('#navAvatar').addEventListener('click', (e) => {
    e.stopPropagation();
    state.userSwitcherOpen = !state.userSwitcherOpen;
    renderUserSwitcher();
  });

  $('#currentUserBar').addEventListener('click', () => {
    state.userSwitcherOpen = !state.userSwitcherOpen;
    renderUserSwitcher();
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('#userSwitcher') && !e.target.closest('#navAvatar') && !e.target.closest('#currentUserBar')) {
      state.userSwitcherOpen = false;
    }

    if (e.target.closest('[data-switch-user]')) {
      switchUser(e.target.closest('[data-switch-user]').dataset.switchUser);
      return;
    }

    if (e.target.dataset.tab) {
      state.messageTab = e.target.dataset.tab;
      renderAll();
      return;
    }

    if (e.target.dataset.itemTab) {
      state.itemTab = e.target.dataset.itemTab;
      renderAll();
      return;
    }

    if (e.target.closest('[data-item-cat]')) {
      state.itemCategory = e.target.closest('[data-item-cat]').dataset.itemCat;
      state.itemSubType = 'all';
      renderAll();
      return;
    }

    if (e.target.closest('[data-item-sub]')) {
      state.itemSubType = e.target.closest('[data-item-sub]').dataset.itemSub;
      renderAll();
      return;
    }

    if (e.target.closest('[data-item-mode]')) {
      state.itemViewMode = e.target.closest('[data-item-mode]').dataset.itemMode;
      if (state.itemViewMode === 'list') state.itemPerspective = 'item';
      renderAll();
      return;
    }

    if (e.target.closest('[data-perspective]')) {
      state.itemPerspective = e.target.closest('[data-perspective]').dataset.perspective;
      renderAll();
      return;
    }

    if (e.target.closest('[data-conv]')) {
      openConversation(e.target.closest('[data-conv]').dataset.conv);
      return;
    }

    if (e.target.closest('tr.item-row')) {
      const itemId = e.target.closest('tr.item-row').dataset.item;
      openItemChat(itemId);
      return;
    }

    if (e.target.closest('tr.no-chat')) {
      showToast('该事项暂无关联群聊（演示数据）');
      return;
    }

    if (e.target.dataset.layer) {
      state.activeLayer = e.target.dataset.layer;
      renderAll();
      return;
    }
    if (e.target.dataset.closeLayer) {
      e.stopPropagation();
      popLayer(e.target.dataset.closeLayer);
      return;
    }

    if (e.target.dataset.openItemChat || e.target.closest('[data-open-item-chat]')) {
      const el = e.target.dataset.openItemChat
        ? e.target
        : e.target.closest('[data-open-item-chat]');
      openItemChat(el.dataset.openItemChat, { asLayer: !!state.activeConv });
      return;
    }

    if (e.target.dataset.openItemAi) {
      openItemAI(e.target.dataset.openItemAi);
      return;
    }

    if (e.target.closest('[data-side-item]') && !e.target.closest('[data-open-item-chat]')) {
      const itemId = e.target.closest('[data-side-item]').dataset.sideItem;
      state.selectedSideItem = itemId;
      renderCardPanel(CONVERSATIONS[state.activeLayer || state.activeConv]);
      return;
    }

    if (e.target.id === 'btnTriggerItem') {
      startNewItemAI(state.activeLayer || state.activeConv);
      return;
    }
    if (e.target.id === 'btnTriggerSubItem' || e.target.id === 'toolbarSubItem') {
      startNewItemAI(state.activeLayer || state.activeConv, { isSubItem: true });
      return;
    }
    if (e.target.id === 'btnViewAIDemo') {
      viewAIDemoHistory();
      return;
    }
    if (e.target.id === 'btnOpenAI' || e.target.id === 'toolbarAI') {
      startNewItemAI(state.activeLayer || state.activeConv);
      return;
    }
    if (e.target.id === 'btnToggleCards') {
      state.showCardPanel = !state.showCardPanel;
      renderChat();
      return;
    }

    if (e.target.id === 'draftConfirm') {
      confirmDraft();
      return;
    }
    if (e.target.id === 'draftEdit') {
      showToast('请继续在对话框中补充修改信息');
      return;
    }

    if (e.target.dataset.submitForm) {
      submitForm(e.target.dataset.submitForm);
      return;
    }
    if (e.target.dataset.fillForm) {
      openItemChat('item15');
      return;
    }

    if (e.target.closest('[data-user]')) {
      const userId = e.target.closest('[data-user]').dataset.user;
      const dmMap = { li: 'dm_li', wang: 'dm_wang', sun: 'dm_sun', liu: 'group_sales', zhou: 'group_sales' };
      const dmId = dmMap[userId];
      if (dmId) {
        if (dmId.startsWith('group')) openConversation(dmId);
        else openConversation(dmId);
      }
      return;
    }

    if (e.target.id === 'triggerCancel') {
      $('#triggerModal').classList.remove('show');
      state.pendingTrigger = null;
      return;
    }
    if (e.target.id === 'triggerConfirm') {
      $('#triggerModal').classList.remove('show');
      const tr = state.pendingTrigger;
      state.pendingTrigger = null;
      if (tr?.presetKey === 'performance' && tr?.itemId) {
        openItemChat(tr.itemId);
        showToast('已进入业绩上报事项，可体验填报与汇总');
      } else {
        startNewItemAI(tr?.convId || state.activeConv);
      }
      return;
    }
  });

  $('#fabBtn').addEventListener('click', () => startNewItemAI());
  $('#quickNewItem').addEventListener('click', () => startNewItemAI());
  $('#quickSales').addEventListener('click', () => {
    state.currentUserId = 'liu';
    openConversation('group_sales');
    showToast('已切换为销售总监刘峰，浏览销售团队群完整场景');
  });
  $('#quickBrowse').addEventListener('click', () => {
    state.section = 'items';
    state.itemTab = 'todo';
    state.itemCategory = 'all';
    state.itemViewMode = 'list';
    renderAll();
  });

  $('#quickLedger').addEventListener('click', () => {
    state.section = 'items';
    state.itemCategory = 'approval';
    state.itemSubType = 'purchase';
    state.itemViewMode = 'ledger';
    state.itemPerspective = 'business';
    renderAll();
  });

  $('#sendBtn').addEventListener('click', sendMessage);
  $('#chatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  $('#chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Init
  renderAll();
  </script>
</body>
</html>
