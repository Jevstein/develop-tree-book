<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIM — 智能工作协同</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-soft: #eff6ff;
      --success: #059669;
      --success-soft: #ecfdf5;
      --warning: #d97706;
      --warning-soft: #fffbeb;
      --danger: #dc2626;
      --ai: #7c3aed;
      --ai-soft: #f5f3ff;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 16px rgba(15, 23, 42, 0.04);
      --radius: 12px;
      --radius-sm: 8px;
      --sidebar-w: 72px;
      --list-w: 300px;
      --card-panel-w: 340px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea { font-family: inherit; }

    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Icon sidebar ── */
    .icon-nav {
      width: var(--sidebar-w);
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 4px;
      flex-shrink: 0;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .nav-btn {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: #94a3b8;
      transition: all 0.15s;
      position: relative;
    }

    .nav-btn:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }
    .nav-btn.active { background: rgba(37,99,235,0.25); color: #60a5fa; }
    .nav-btn .icon { font-size: 20px; line-height: 1; }
    .nav-btn .label { font-size: 10px; }

    .nav-btn .badge {
      position: absolute;
      top: 6px;
      right: 6px;
      min-width: 16px;
      height: 16px;
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .nav-spacer { flex: 1; }

    .avatar-sm {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }

    /* ── List panel ── */
    .list-panel {
      width: var(--list-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .list-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .list-header h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
    }

    .search-box input {
      border: none;
      background: none;
      outline: none;
      flex: 1;
      font-size: 13px;
      color: var(--text);
    }

    .search-box input::placeholder { color: var(--text-3); }

    .sub-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }

    .sub-tab {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
      transition: all 0.15s;
    }

    .sub-tab:hover { background: var(--bg); }
    .sub-tab.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }

    .list-body {
      flex: 1;
      overflow-y: auto;
    }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.1s;
      border-bottom: 1px solid transparent;
    }

    .list-item:hover { background: var(--surface-2); }
    .list-item.active { background: var(--primary-soft); }

    .item-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .item-avatar.group { border-radius: 10px; }
    .item-avatar.ai { background: linear-gradient(135deg, #7c3aed, #a78bfa) !important; }
    .item-avatar.system { background: #64748b !important; border-radius: 10px; }
    .item-avatar.item { background: linear-gradient(135deg, #059669, #34d399) !important; border-radius: 10px; }

    .item-content { flex: 1; min-width: 0; }
    .item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-time { font-size: 11px; color: var(--text-3); flex-shrink: 0; }
    .item-preview { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { display: flex; gap: 6px; margin-top: 4px; align-items: center; }

    .tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .tag.todo { background: #fef3c7; color: #b45309; }
    .tag.processing { background: var(--primary-soft); color: var(--primary); }
    .tag.done { background: var(--success-soft); color: var(--success); }
    .tag.ai-tag { background: var(--ai-soft); color: var(--ai); }

    .unread-dot {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .fab-btn {
      margin: 12px 16px;
      padding: 10px;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s;
    }

    .fab-btn:hover { background: var(--primary-hover); }

    /* ── Main content ── */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-2);
    }

    .welcome-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #fff;
      box-shadow: var(--shadow);
    }

    .welcome h3 { font-size: 20px; color: var(--text); }
    .welcome p { font-size: 14px; max-width: 400px; text-align: center; line-height: 1.6; }

    .quick-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .quick-btn {
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.15s;
    }

    .quick-btn:hover { border-color: var(--primary); color: var(--primary); }
    .quick-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .quick-btn.primary:hover { background: var(--primary-hover); }

    /* ── Chat view ── */
    .chat-view {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--surface);
    }

    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-info h3 { font-size: 15px; font-weight: 700; }
    .chat-header-info p { font-size: 12px; color: var(--text-2); margin-top: 2px; }

    .layer-tabs {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      overflow-x: auto;
      flex-shrink: 0;
    }

    .layer-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
      border: 1px solid transparent;
      transition: all 0.15s;
    }

    .layer-tab:hover { background: var(--surface); border-color: var(--border); }
    .layer-tab.active { background: var(--surface); border-color: var(--primary); color: var(--primary); font-weight: 600; box-shadow: var(--shadow); }
    .layer-tab .close-layer { opacity: 0.5; font-size: 14px; padding: 0 2px; }
    .layer-tab .close-layer:hover { opacity: 1; color: var(--danger); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-date {
      text-align: center;
      font-size: 11px;
      color: var(--text-3);
      margin: 4px 0;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 75%;
    }

    .message.self { align-self: flex-end; flex-direction: row-reverse; }
    .message.system-msg { align-self: center; max-width: 90%; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .message.self .msg-bubble {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .message.ai .msg-bubble {
      background: var(--ai-soft);
      border-color: #ddd6fe;
    }

    .msg-sender { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
    .message.self .msg-sender { text-align: right; }

    .system-msg .msg-bubble {
      background: var(--warning-soft);
      border-color: #fde68a;
      color: var(--warning);
      font-size: 12px;
      text-align: center;
    }

    /* Item card in chat */
    .item-card-inline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      max-width: 320px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.15s;
    }

    .item-card-inline:hover { border-color: var(--primary); transform: translateY(-1px); }

    .card-inline-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-inline-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--success-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .card-inline-title { font-size: 14px; font-weight: 700; }
    .card-inline-id { font-size: 11px; color: var(--text-3); }

    .card-inline-body { font-size: 12px; color: var(--text-2); line-height: 1.5; margin-bottom: 10px; }

    .card-inline-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-3);
    }

    .card-inline-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .card-action-btn {
      flex: 1;
      padding: 6px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }

    .card-action-btn:hover { border-color: var(--primary); color: var(--primary); }
    .card-action-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .card-action-btn.primary:hover { background: var(--primary-hover); }

    /* AI draft card */
    .draft-card {
      background: var(--surface);
      border: 2px dashed var(--ai);
      border-radius: var(--radius);
      padding: 16px;
      max-width: 380px;
    }

    .draft-card h4 {
      font-size: 14px;
      color: var(--ai);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .draft-field {
      display: flex;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .draft-label { color: var(--text-3); width: 72px; flex-shrink: 0; }
    .draft-value { color: var(--text); font-weight: 500; }

    .draft-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .chat-input-area {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .toolbar-btn {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-2);
      border: 1px solid var(--border);
      transition: all 0.15s;
    }

    .toolbar-btn:hover { border-color: var(--primary); color: var(--primary); }
    .toolbar-btn.ai-btn { border-color: #c4b5fd; color: var(--ai); background: var(--ai-soft); }
    .toolbar-btn.ai-btn:hover { background: #ede9fe; }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .chat-textarea:focus { border-color: var(--primary); }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--primary-hover); }
    .send-btn:disabled { background: var(--text-3); cursor: not-allowed; }

    /* ── Right card panel ── */
    .card-panel {
      width: var(--card-panel-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .card-panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-panel-header h3 { font-size: 14px; font-weight: 700; }

    .card-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .side-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .side-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
    .side-card.active { border-color: var(--primary); background: var(--primary-soft); }

    .side-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .side-card-title { font-size: 13px; font-weight: 700; line-height: 1.4; }
    .side-card-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }

    .side-card-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; margin-bottom: 10px; }

    .side-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
      color: var(--text-3);
    }

    .side-card-meta span { display: flex; align-items: center; gap: 3px; }

    .side-card-nested {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }

    .nested-link {
      font-size: 11px;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
    }

    .nested-link:hover { text-decoration: underline; }

    .timeline {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .timeline h4 { font-size: 12px; font-weight: 700; margin-bottom: 10px; color: var(--text-2); }

    .timeline-item {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 11px;
    }

    .timeline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      margin-top: 4px;
      flex-shrink: 0;
    }

    .timeline-dot.done { background: var(--success); }
    .timeline-content { color: var(--text-2); line-height: 1.4; }
    .timeline-time { color: var(--text-3); font-size: 10px; }

    /* ── Items view table ── */
    .items-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .items-toolbar {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .items-toolbar h2 { font-size: 18px; font-weight: 700; }

    .filter-chips {
      display: flex;
      gap: 8px;
    }

    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid var(--border);
      color: var(--text-2);
      transition: all 0.15s;
    }

    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .items-table-wrap {
      flex: 1;
      overflow: auto;
      padding: 0 24px 24px;
    }

    .items-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-top: 16px;
    }

    .items-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .items-table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .items-table tr:hover td { background: var(--surface-2); }
    .items-table tr:last-child td { border-bottom: none; }

    /* ── Contacts ── */
    .contacts-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      padding: 20px 24px;
      overflow-y: auto;
    }

    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .contact-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }

    .contact-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .contact-name { font-size: 14px; font-weight: 600; }
    .contact-dept { font-size: 12px; color: var(--text-2); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .toast {

      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      z-index: 2000;
      transition: transform 0.3s;
      box-shadow: var(--shadow);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--ai);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }

    .header-actions { display: flex; gap: 8px; }

    /* ── Items hub: categories + ledger + stats ── */

      flex: 1;

    .stat-grid {

    .stat-card {

    .form-card-inline, .summary-card-inline, .app-card-inline {

    }
    .form-card-inline { border-left: 3px solid #be185d; }
    .summary-card-inline { border-left: 3px solid var(--success); background: var(--success-soft); }
    .app-card-inline { border-left: 3px solid var(--primary); }

    .submit-status { margin-top: 10px; font-size: 11px; }

    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }

    .scene-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #fce7f3; color: #be185d; font-weight: 600; }
    .process-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--primary-soft); color: var(--primary); font-weight: 600; }

    .items-table .no-chat { color: var(--text-3); cursor: default; }

    .report-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 1100px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .report-row { grid-template-columns: 1fr; }
    }

    .perspective-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .perspective-label { font-size: 12px; color: var(--text-3); margin-right: 4px; }

    .perspective-tab {
      padding: 5px 14px;
      border-radius: 16px;

      border: 1px solid var(--border);
      color: var(--text-2);

      transition: all 0.15s;

    .perspective-tab:hover { border-color: var(--primary); color: var(--primary); }
    .perspective-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .biz-section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .biz-section-title .biz-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 600;
    }

    .mini-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 8px;
    }

    .mini-table th, .mini-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .mini-table th { background: var(--surface-2); color: var(--text-2); font-weight: 600; }

    .progress-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .progress-mini {
      flex: 1;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-mini-fill { height: 100%; border-radius: 3px; background: var(--primary); }

    .warn-badge { color: #dc2626; font-size: 11px; font-weight: 600; }
    .ok-badge { color: #059669; font-size: 11px; }

<body>

    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function getUser(id) {
    return USERS[id] || { name: id, avatar: '?', color: '#64748b' };
  }

  function statusClass(s) {
    return { todo: 'todo', processing: 'processing', done: 'done' }[s] || 'processing';
  }

  function getItemChatId(itemId) {
    return ITEMS[itemId]?.chatId || null;
  }

  function filterConversations() {
    const tab = state.messageTab;
    return Object.values(CONVERSATIONS).filter(c => {
      if (c.archived) return false;
      if (c.id === 'ai_new' && c.messages.length === 0 && tab !== 'all') return false;
      if (tab === 'all') return c.type !== 'ai' || c.messages.length > 0;
      if (tab === 'dm') return c.type === 'dm';
      if (tab === 'group') return c.type === 'group';
      if (tab === 'item') return c.type === 'item';
      if (tab === 'system') return c.type === 'system';
      return true;
    });
  }

  function filterItems() {
    const uid = state.currentUserId;
    const tab = state.itemTab;
    const cat = state.itemCategory;
    const sub = state.itemSubType;

    return Object.values(ITEMS).filter(item => {
      if (cat !== 'all' && item.category !== cat) return false;
      if (cat === 'approval' && sub !== 'all' && item.subType !== sub) return false;
      if (cat === 'business' && sub !== 'all' && item.subType !== sub) return false;

      if (tab === 'todo') {
        return (item.status === 'todo' || item.status === 'processing') &&
          (item.handler === uid || (item.initiator === uid && item.status === 'processing'));
      }
      if (tab === 'initiated') return item.initiator === uid;
      if (tab === 'joined') return item.participants.includes(uid) && item.initiator !== uid;
      if (tab === 'done') return item.status === 'done' && item.participants.includes(uid);
      return item.participants.includes(uid);
    });
  }

  function countByCategory(catId) {
    const uid = state.currentUserId;
    return Object.values(ITEMS).filter(i =>
      i.participants.includes(uid) && (catId === 'all' || i.category === catId)
    ).length;
  }

  function renderListPanel() {
    if (state.section !== 'messages') return;

    $('#listTitle').textContent = '工作消息';

    const tabs = $('#subTabs');
    tabs.innerHTML = MESSAGE_TABS.map(t =>
      `<button class="sub-tab ${t.id === state.messageTab ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`

    const convs = filterConversations();
    const body = $('#listBody');
    body.innerHTML = convs.map(c => {
      const isAI = c.type === 'ai';
      const isGroup = c.type === 'group';
      const isItem = c.type === 'item';
      const isSystem = c.type === 'system';
      let avatarClass = isAI ? 'ai' : isGroup ? 'group' : isItem ? 'item' : isSystem ? 'system' : '';
      let avatarContent = isAI ? '✦' : isGroup ? '团' : isItem ? '事' : isSystem ? '🔔' : getUser(c.userId).avatar;
      let avatarColor = isAI || isGroup || isItem || isSystem ? '' : `background:${getUser(c.userId).color}`;

      return `<div class="list-item ${state.activeConv === c.id ? 'active' : ''}" data-conv="${c.id}">
        <div class="item-avatar ${avatarClass}" style="${avatarColor}">${avatarContent}</div>

          <div class="item-top">
            <span class="item-name">${c.name}</span>
            <span class="item-time">${c.time}</span>

        ${c.unread ? '<div class="unread-dot"></div>' : ''}
      </div>`;
    }).join('');

  function getBizKey() {
    const cat = state.itemCategory;
    const sub = state.itemSubType;
    if (cat === 'approval' && sub !== 'all') return sub;
    if (cat === 'approval') return 'approval';
    if (cat === 'business' && sub !== 'all') return sub;
    if (cat === 'business') return 'business';
    if (cat === 'task') return 'task';
    if (cat === 'meeting') return 'meeting';
    if (cat === 'schedule') return 'schedule';
    return 'all';
  }

  function getFormDef(formId) {
    return FORM_DEFINITIONS[formId];
  }

  function getFormSubmittedUsers(formId) {
    const form = getFormDef(formId);
    return form ? Object.keys(form.submissions) : [];
  }

  function computeFormSummary(formId) {
    const form = getFormDef(formId);
    if (!form) return null;
    const subs = Object.values(form.submissions);
    if (!subs.length) return null;
    const sum = (key) => subs.reduce((s, r) => s + (Number(r[key]) || 0), 0);
    return {
      signed: sum('签约金额(万)'),
      received: sum('回款金额(万)'),
      newClients: sum('新客户数'),
      opps: sum('有效商机数'),
      count: subs.length,
      total: form.assignees.length,
    };
  }

    $('#triggerContent').textContent = preset.content;
    $('#triggerAction').textContent = preset.action;
    $('#triggerScope').textContent = preset.scope;
    $('#triggerModal').classList.add('show');

  function submitForm(formId) {
    const form = getFormDef(formId);
    const uid = state.currentUserId;
    if (!form || form.submissions[uid]) {
      showToast(form?.submissions[uid] ? '您已提交过' : '表单不存在');
      return;
    }
    if (!form.assignees.includes(uid)) {
      showToast('您不在本次填报范围内');
      return;
    }
    const defaults = uid === 'huang'
      ? { '签约金额(万)': 180, '回款金额(万)': 165, '新客户数': 2, '有效商机数': 6, '备注': '客户成功续费贡献' }
      : { '签约金额(万)': 100, '回款金额(万)': 90, '新客户数': 1, '有效商机数': 4, '备注': '已填报' };
    form.submissions[uid] = defaults;
    const item = ITEMS[form.itemId];
    const chat = CONVERSATIONS[item?.chatId];
    if (chat) {
      chat.messages.push({ from: uid, text: `${getUser(uid).name} 已完成业绩填报 ✓`, time: '刚刚' });
      const submitted = getFormSubmittedUsers(formId).length;
      const total = form.assignees.length;
      item.statusLabel = `收集中 ${submitted}/${total}`;
      if (submitted >= total) {
        chat.messages.push({ type: 'summary', formId, time: '刚刚' });
        item.status = 'done';
        item.statusLabel = '已全部汇总';
        showToast('全员填报完成！AIM 已生成 Q1 业绩汇总');
      } else {
        chat.messages.push({ type: 'partial_summary', formId, time: '刚刚' });
        showToast('填报已提交');
      }
    }
    renderAll();
  }

  function renderBusinessStats(items, cat) {
    const key = getBizKey();
    const meta = getBizMeta();
    let stats = '';
    let charts = '';

    if (key === 'leave') {
      const byType = { '年假': 2, '病假': 1, '事假': 1 };
      const byDept = {};
      BUSINESS_DATA.leaveRecords.forEach(r => {
        const dept = BUSINESS_DATA.leaveBalances.find(b => b.userId === r.userId)?.dept || '—';
        byDept[dept] = (byDept[dept] || 0) + r.days;
      });
      const totalDays = BUSINESS_DATA.leaveRecords.reduce((s, r) => s + r.days, 0);
      const lowBalance = BUSINESS_DATA.leaveBalances.filter(b => b.remain <= 5).length;
      stats = `
        <div class="stat-card highlight"><div class="stat-label">本月请假总天数</div><div class="stat-value">${totalDays}</div><div class="stat-sub">${BUSINESS_DATA.leaveRecords.length} 笔申请</div></div>
        <div class="stat-card"><div class="stat-label">余额预警人数</div><div class="stat-value" style="color:#dc2626">${lowBalance}</div><div class="stat-sub">年假剩余 ≤5 天</div></div>`;
      charts = `<div class="report-row">
        <div class="chart-panel"><h4>假期类型分布</h4><div class="bar-chart">
          ${Object.entries(byType).map(([k, v]) => `<div class="bar-row"><span class="bar-label">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${v/3*100}%;background:#f59e0b">${v}次</div></div></div>`).join('')}
        </div></div>
        <div class="chart-panel"><h4>部门休假天数</h4><div class="bar-chart">
          ${Object.entries(byDept).map(([k, v]) => `<div class="bar-row"><span class="bar-label">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${v/8*100}%;background:#3b82f6">${v}天</div></div></div>`).join('')}
        </div></div>
      </div>
      <div class="chart-panel"><h4>员工年假余额</h4><div class="bar-chart">
        ${BUSINESS_DATA.leaveBalances.map(b => `<div class="bar-row"><span class="bar-label">${getUser(b.userId).name}</span><div class="bar-track"><div class="bar-fill" style="width:${b.remain/b.annual*100}%;background:${b.remain<=3?'#ef4444':'#10b981'}">${b.remain}/${b.annual}天</div></div></div>`).join('')}
      </div></div>`;
    } else if (key === 'purchase') {
      const totalAsset = BUSINESS_DATA.assets.reduce((s, a) => s + a.total, 0);
      const inUse = BUSINESS_DATA.assets.filter(a => a.status === '在用').length;
      const pending = BUSINESS_DATA.assets.filter(a => a.status === '采购中').length;
      const byCat = {};
      BUSINESS_DATA.assets.forEach(a => { byCat[a.category] = (byCat[a.category] || 0) + a.total; });
      const maxCat = Math.max(...Object.values(byCat));
      stats = `
        <div class="stat-card highlight"><div class="stat-label">资产总值</div><div class="stat-value" style="font-size:22px">${formatAmount(totalAsset)}</div><div class="stat-sub">${BUSINESS_DATA.assets.length} 项资产</div></div>
        <div class="stat-card"><div class="stat-label">在用 / 采购中</div><div class="stat-value">${inUse} / ${pending}</div></div>`;
      charts = `<div class="report-row">
        <div class="chart-panel"><h4>资产类别金额分布</h4><div class="bar-chart">
          ${Object.entries(byCat).map(([k, v]) => `<div class="bar-row"><span class="bar-label">${k}</span><div class="bar-track"><div class="bar-fill" style="width:${v/maxCat*100}%;background:#f59e0b">${formatAmount(v)}</div></div></div>`).join('')}
        </div></div>
        <div class="chart-panel"><h4>采购订单状态</h4><div class="bar-chart">
          ${BUSINESS_DATA.purchaseOrders.map(p => `<div class="bar-row"><span class="bar-label" style="width:90px;font-size:11px">${p.code}</span><div class="bar-track"><div class="bar-fill" style="width:70%;background:#3b82f6">${formatAmount(p.amount)}</div></div><span class="bar-val">${p.status}</span></div>`).join('')}
        </div></div>
      </div>`;
    } else if (key === 'expense') {
      const total = BUSINESS_DATA.expenses.reduce((s, e) => s + e.total, 0);
